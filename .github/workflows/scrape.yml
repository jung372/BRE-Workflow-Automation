name: 모니터링 데이터 갱신

on:
  schedule:
    - cron: '0 * * * *'   # 매 1시간마다 실행 (UTC 기준, 한국시간 매 시 정각+9h)
  workflow_dispatch:       # GitHub Actions 탭에서 수동 실행 가능

# Node.js 24 강제 적용 (Node.js 20 deprecated 경고 해결)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write          # 결과 JSON을 repo에 커밋할 수 있도록 쓰기 권한 부여

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: pip install -r requirements.txt

      - name: 🌐 Playwright 시스템 의존성 설치
        run: playwright install-deps chromium

      - name: 🌐 Playwright Chromium 브라우저 설치
        run: playwright install chromium

      - name: 🔍 스크래핑 실행
        env:
          METMAST_SIRU_URL: ${{ secrets.METMAST_SIRU_URL }}
          METMAST_SIRU_ID:  ${{ secrets.METMAST_SIRU_ID }}
          METMAST_SIRU_PW:  ${{ secrets.METMAST_SIRU_PW }}
          METMAST_GOGK_URL: ${{ secrets.METMAST_GOGK_URL }}
          METMAST_GOGK_ID:  ${{ secrets.METMAST_GOGK_ID }}
          METMAST_GOGK_PW:  ${{ secrets.METMAST_GOGK_PW }}
          METMAST_BLMU_URL: ${{ secrets.METMAST_BLMU_URL }}
          METMAST_BLMU_ID:  ${{ secrets.METMAST_BLMU_ID }}
          METMAST_BLMU_PW:  ${{ secrets.METMAST_BLMU_PW }}
        run: python scraper.py

      - name: 💾 결과 커밋 & 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/status.json last_state.json
          git diff --staged --quiet || git commit -m "chore: update monitoring data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
